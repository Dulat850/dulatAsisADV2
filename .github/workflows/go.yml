name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, payment-service]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Build ${{ matrix.service }}
      run: go build -v ./...
      working-directory: ./${{ matrix.service }}

    - name: Test ${{ matrix.service }}
      run: go test -v ./...
      working-directory: ./${{ matrix.service }}
